# Strict ESLint gate — fails the build on any warning OR error.
# Catches drift before it reaches main. Ported from neckarshore-website
# PR #11 after the L-RETRO-R3 cross-site Lint-Gate audit (planning
# reports 2026-05-14): rauhut had no Lint CI job at all, so any new
# warning or error would have slipped through main silently.
#
# Security-note: this workflow uses ZERO untrusted github.event.* inputs.
# All run-steps are static literals. No command-injection surface.
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ESLint (strict, zero warnings)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint with strict gate
        run: npm run lint -- --max-warnings 0
