name: Lighthouse Audit

on:
  # Manual fallback — the scheduled cron has proven unreliable on low-traffic
  # repos (3 of 4 sites' Monday crons never fired on 2026-06-01). Lets us
  # trigger an on-demand Lighthouse run via `gh workflow run lighthouse.yml`.
  workflow_dispatch:
  push:
    branches: [main]
    # A stats.json-only commit (pushed by e2e.yml's emit-stats job) must not re-trigger
    # this workflow — nothing here depends on the emitted data file.
    paths-ignore:
      - 'stats.json'
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:15 UTC — staggered from neckarshore (06:00) per
    # Bundle-A Plan-Doc 2026-05-21 § Work-Item 3 to avoid GitHub Actions
    # parallel-quota.
    - cron: "15 6 * * 1"

jobs:
  lighthouse:
    name: Lighthouse (Desktop + Mobile)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # rauhut-website serves on port 3001 (see package.json `start` script).
      LIGHTHOUSE_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Start server
        run: npm run start &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf "$LIGHTHOUSE_URL" > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Run Lighthouse audit
        run: npm run lighthouse:quick

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: .lighthouse/
          retention-days: 14
          include-hidden-files: true
