name: E2E (Playwright)

# Wires the local Playwright suite into CI so it gates every PR + push to main.
# Until now the E2E suite (tests/e2e/ — homepage content, DE/EN language
# toggle, theme persistence, the /designs gallery) ran local-only and blocked
# no merge. This is the structural "tests-before-features" gate
# (L-TEST-COVERAGE-PACKAGE; ported from neckarshore PR #27).
#
# The dev server is managed by Playwright's `webServer` block in
# playwright.config.ts (next dev on :3001) — no separate build/start step.
# The config sets retries=2 under CI for shared-runner stability.
#
# Uses `test:e2e:ci` = `playwright test --grep-invert @external`. Rauhut's
# suite has no @external-tagged tests today (every assertion is against the
# locally-served app; the designs spec's request.get() hits local /designs/
# URLs), but the flag keeps the family CI contract identical: the gate never
# hits third-party hosts that bot-block datacenter IPs.

on:
  workflow_dispatch:
  push:
    branches: [main]
    # Break the emit commit-loop: the emit-stats job below commits a stats.json-only
    # commit to main; paths-ignore keeps that commit from re-triggering this workflow
    # (cleaner than a [skip ci] string convention). estate stats-json-contract, Phase 3.
    paths-ignore:
      - 'stats.json'
  pull_request:
    branches: [main]

# Least-privilege default token — the e2e job only reads the repo. emit-stats re-grants
# contents:write for its job only (job-scoped, never workflow-wide).
permissions:
  contents: read

concurrency:
  # Cancel superseded PR runs; let every push-to-main run complete (each main
  # commit stays gated).
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (excludes @external)
        run: npm run test:e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # Estate stats.json producer (test-scope facet, backlog #391 Lane 3 / direct-to-main).
  # main is public + UNPROTECTED, so the CI bot commits stats.json straight to main on every
  # push:main, AFTER the e2e gate. Runs even when e2e fails (if: always) so a non-green run
  # emits red:true — never a stale-green count. contents:write is scoped to THIS job only;
  # the workflow-level paths-ignore on stats.json breaks the re-trigger loop. Mirrors the
  # md-viewer direct-to-main precedent.
  #
  # WHAT IS COUNTED: the Playwright e2e suite this job's `e2e` gate runs (`test:e2e:ci` =
  # `--grep-invert @external`), enumerated via `playwright test --list` (the authoritative
  # "Total: N tests" summary — never grep). Count-set == gate-set. The Node unit suite(s), if
  # any, use ad-hoc `check()` / node:test reporters that no test-stats-action adapter parses
  # yet — deliberately NOT counted here; needs a node:test/ok-summary adapter (AP-1) + a
  # one-line runners: addition. The emitted total is an honest e2e floor until then.
  # Contract: https://github.com/neckarshore-ai/neckarshore-planning/blob/main/docs/reference/stats-json-contract.md
  emit-stats:
    name: Emit stats.json (estate producer)
    needs: e2e
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    concurrency:
      # Serialize emits so two rapid pushes cannot race on the git push to main.
      group: emit-stats-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Enumerate the GATED e2e suite for its count. `--list` collects only (no server, no
      # browser) — it prints the authoritative "Total: N tests in M files" the action parses.
      # The e2e EXECUTION result comes from needs.e2e.result (the gate job above). The
      # `--grep-invert @external` selection is exactly what test:e2e:ci gates.
      - name: Capture e2e reporter (playwright --list)
        run: npx playwright test --grep-invert @external --list > /tmp/e2e-list.out 2>&1 || true

      # Pinned to the full commit SHA of test-stats-action (third-party actions are SHA-pinned,
      # never tag-floated). 54ae407 is the PIR-passed pin — the same pin md-viewer + trustscope
      # run. declared left empty: no executed-but-ungated suite is counted.
      - name: Emit stats.json
        uses: neckarshore-ai/test-stats-action@54ae407769bdfea6b8fed2672f0ceefa5ef2588a
        with:
          repo: ${{ github.repository }}
          out: stats.json
          sha: ${{ github.sha }}
          test_result: ${{ needs.e2e.result }}
          runners: |
            e2e:playwright:/tmp/e2e-list.out

      # Structural contract gate — invariants that hold on BOTH green and red runs. Deliberately
      # does NOT assert a golden total (a red run legitimately undercounts and must still emit).
      - name: Validate emitted stats.json against the contract
        run: |
          jq -e --arg repo "$GITHUB_REPOSITORY" '
            .repo == $repo
            and (.audited_sha | type == "string" and length > 0)
            and (.tests.total == ([.tests.byType[]] | add))
            and (.tests.byType | has("e2e"))
            and (.tests.declared == {})
            and (.red | type == "boolean")
          ' stats.json > /dev/null \
            || { echo "::error::stats.json failed contract validation"; cat stats.json; exit 1; }
          echo "stats.json is contract-valid:"; cat stats.json

      # Commit stats.json to main only when the meaningful fields changed (everything EXCEPT the
      # always-changing updatedAt): a new push has a new audited_sha -> commit (keeps the number
      # fresh); a re-run on the same sha differs only by timestamp -> no churn commit. The
      # workflow-level paths-ignore on stats.json stops this commit from re-triggering the e2e run.
      - name: Commit stats.json to main when it changed
        run: |
          norm() { jq -S 'del(.updatedAt)' "$1" 2>/dev/null; }
          if git show HEAD:stats.json > /tmp/prev-stats.json 2>/dev/null \
             && [ "$(norm /tmp/prev-stats.json)" = "$(norm stats.json)" ]; then
            echo "stats.json unchanged (ignoring timestamp) — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git commit -m "chore(stats): emit stats.json @ ${GITHUB_SHA:0:7}"
          git push origin HEAD:main
