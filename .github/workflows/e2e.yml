name: E2E (Playwright)

# Wires the local Playwright suite into CI so it gates every PR + push to main.
# Until now the E2E suite (tests/e2e/ — homepage content, DE/EN language
# toggle, theme persistence, the /designs gallery) ran local-only and blocked
# no merge. This is the structural "tests-before-features" gate
# (L-TEST-COVERAGE-PACKAGE; ported from neckarshore PR #27).
#
# The dev server is managed by Playwright's `webServer` block in
# playwright.config.ts (next dev on :3001) — no separate build/start step.
# The config sets retries=2 under CI for shared-runner stability.
#
# Uses `test:e2e:ci` = `playwright test --grep-invert @external`. Rauhut's
# suite has no @external-tagged tests today (every assertion is against the
# locally-served app; the designs spec's request.get() hits local /designs/
# URLs), but the flag keeps the family CI contract identical: the gate never
# hits third-party hosts that bot-block datacenter IPs.

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  # Cancel superseded PR runs; let every push-to-main run complete (each main
  # commit stays gated).
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (excludes @external)
        run: npm run test:e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
