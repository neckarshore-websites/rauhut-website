name: Unit

# CI gate for the pure Node/tsx unit tests (Test Charter §4c — every existing
# suite must run in CI). Green locally but invoked by no workflow. Fast, no
# browser, no secrets — kept in their own lightweight job.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    name: Node unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:lighthouse:unit
