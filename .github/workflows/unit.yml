name: Unit

# CI gate for the pure Node/tsx unit tests (Test Charter §4c — every existing
# suite must run in CI). Green locally but invoked by no workflow. Fast, no
# browser, no secrets — kept in their own lightweight job.

on:
  push:
    branches: [main]
    # A stats.json-only commit (pushed by e2e.yml's emit-stats job) must not re-trigger
    # this workflow — nothing here depends on the emitted data file.
    paths-ignore:
      - 'stats.json'
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    name: Node unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          # 22, not 20: test:unit runs a TypeScript test file directly via
          # node --test, which needs Node >=22.6's native type-stripping.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lighthouse-profile unit tests
        run: npm run test:lighthouse:unit

      - name: Run contact-action + lighthouse-url unit tests
        run: npm run test:unit
