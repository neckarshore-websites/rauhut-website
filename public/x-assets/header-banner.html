<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>X Header Banner — @germanrauhut</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Geist+Mono:wght@400;500&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0A0A;
    --text: #F5F5F5;
    --text-muted: #A3A3A3;
    --text-subtle: #737373;
    --teal: #22D3EE;
    --amber: #F59E0B;
    --border: #262626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1500px; height: 500px; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    position: relative;
    /* Subtle radial glow top-right — echoes rauhut.com .hero-glow */
    background-image: radial-gradient(ellipse at 78% 30%, rgba(34,211,238,0.10) 0%, rgba(34,211,238,0) 55%);
  }

  /* Frame */
  .canvas {
    position: absolute;
    inset: 0;
    padding: 44px 64px 36px 64px;
    display: grid;
    grid-template-columns: 1fr 480px;
    grid-template-rows: auto 1fr auto;
    gap: 0 56px;
    align-items: start;
  }
  /* Avatar safe-zone marker (invisible, just reserves the bottom-left 270x140
     area X uses for the profile-pic overlay). The hero text grid above sits
     vertically centered with margin-bottom that respects this zone. */

  /* Eyebrow row */
  .eyebrow {
    grid-column: 1 / -1;
    grid-row: 1;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--amber);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .eyebrow .dot {
    width: 6px; height: 6px;
    background: var(--amber);
    border-radius: 50%;
    display: inline-block;
  }

  /* Hero statement (left column) */
  .hero {
    grid-column: 1;
    grid-row: 2;
    align-self: center;
    /* Anchored slightly above center so the H1 sits comfortably above the
       avatar-overlay safe zone. */
    margin-top: -4px;
    margin-bottom: 28px;
  }
  .hero h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 104px;
    line-height: 0.98;
    letter-spacing: -0.028em;
    color: var(--text);
  }
  .hero h1 .accent {
    color: var(--teal);
  }

  /* Persona list (right column) */
  .roll {
    grid-column: 2;
    grid-row: 2;
    align-self: center;
    border-left: 1px solid var(--border);
    padding-left: 30px;
  }
  .roll .label {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-subtle);
    letter-spacing: 0.20em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .roll ol {
    list-style: none;
    counter-reset: persona;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 26px;
  }
  .roll li {
    counter-increment: persona;
    font-family: 'Geist', sans-serif;
    font-size: 16px;
    color: var(--text-muted);
    letter-spacing: -0.005em;
    display: flex;
    gap: 10px;
    align-items: baseline;
  }
  .roll li::before {
    content: counter(persona, decimal-leading-zero);
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    color: var(--text-subtle);
    letter-spacing: 0.06em;
  }

  /* Footer row — only on the right half, left ~270px reserved for avatar overlay */
  .foot {
    grid-column: 2;
    grid-row: 3;
    display: flex;
    justify-content: flex-end;
    align-items: baseline;
  }
  .foot .mark {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 12px;
    color: var(--text-subtle);
    letter-spacing: 0.12em;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="eyebrow">
      <span class="dot"></span>
      <span>AI-Native Builder</span>
      <span style="color: var(--text-subtle); letter-spacing: 0.18em;">·</span>
      <span>Documentor of AI-Persona-Stacks</span>
    </div>

    <div class="hero">
      <h1>Eleven personas.<br><span class="accent">One protocol.</span></h1>
    </div>

    <div class="roll">
      <div class="label">The Roster — 11 Active</div>
      <ol>
        <li>MASCHIN</li>
        <li>Linus FE</li>
        <li>Bob</li>
        <li>Dr. Sommer</li>
        <li>Obi</li>
        <li>Gary</li>
        <li>James</li>
        <li>Hans CEE</li>
        <li>Lorne CEE</li>
        <li>Sensei</li>
        <li>Jack</li>
      </ol>
    </div>

    <div class="foot">
      <div class="mark">github.com/neckarshore-ai</div>
    </div>
  </div>
</body>
</html>
