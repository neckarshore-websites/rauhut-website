<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>X Avatar — @germanrauhut</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 400px; height: 400px; overflow: hidden; background: #0A0A0A; }
  /* Source: /images/german-rauhut-founder-bw.png (880x1168, B/W portrait).
     X profile picture displays as a circle inscribed in the 400x400 square,
     so the face must sit well inside the circle's safe zone.

     v1 (22%): hair touched top edge, shoulders visible at bottom.
     v2 (38%): shifts the visible source range DOWN — adds ~12px gap above
     hair, clips chest/shoulders out at bottom. Higher object-position-y
     means content slides down in the container; less of the source's top
     is anchored at output-top, less of the source's bottom is shown. */
  .avatar {
    width: 400px;
    height: 400px;
    object-fit: cover;
    object-position: center 38%;
    display: block;
  }
</style>
</head>
<body>
  <img class="avatar"
       src="file:///Users/germanrauhut.com/Developer/projects/neckarshore-ai/rauhut-website/public/images/german-rauhut-founder-bw.png"
       alt="German Rauhut — B/W portrait">
</body>
</html>
