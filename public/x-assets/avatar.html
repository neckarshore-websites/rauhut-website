<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>X Avatar — @germanrauhut</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 400px; height: 400px; overflow: hidden; background: #0A0A0A; }
  /* Source: /images/german-rauhut-founder-bw.png (880x1168, B/W portrait).
     X profile picture displays as a circle inscribed in the 400x400 square,
     so the face must sit well inside the circle's safe zone.

     Iteration history (object-position-y):
     - v1 22%: hair tip at output top edge, full chest visible
     - v2 38%: WRONG DIRECTION — shifted image up (showed source LOWER
       portion), pushed face into circle worse
     - v3 10%: shifts image DOWN in container — shows source TOP MORE
       (= dark studio background above hair = gap), AND clips source
       bottom (= chest/shoulders removed). Both goals in one move.

     Lower object-position-y = image anchored to top of container =
     image-top y in container approaches 0 = source-top dark area
     visible at output-top. */
  .avatar {
    width: 400px;
    height: 400px;
    object-fit: cover;
    object-position: center 10%;
    display: block;
  }
</style>
</head>
<body>
  <img class="avatar"
       src="file:///Users/germanrauhut.com/Developer/projects/neckarshore-ai/rauhut-website/public/images/german-rauhut-founder-bw.png"
       alt="German Rauhut — B/W portrait">
</body>
</html>
